apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atom-operator
  namespace: {{ .Values.rbac.namespace }}
  labels:
    app.kubernetes.io/name: atom-operator
    app.kubernetes.io/version: "7.0"
spec:
  serviceName: atom-operator
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: atom-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atom-operator
        app.kubernetes.io/version: "7.0"
    spec:
      serviceAccountName: {{ .Values.rbac.operatorServiceAccount }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: operator
          image: {{ .Values.operator.image }}
          imagePullPolicy: Always
          env:
            - name: WATCH_NAMESPACE
              value: {{ .Values.operator.watchNamespace }}
            - name: RECONCILE_INTERVAL
              value: "{{ .Values.operator.reconcileInterval }}"
            - name: LOG_LEVEL
              value: {{ .Values.operator.logLevel }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: atom-operator
  namespace: {{ .Values.rbac.namespace }}
  labels:
    app.kubernetes.io/name: atom-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atom-operator
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
    - name: health
      port: 8080
      targetPort: 8080
