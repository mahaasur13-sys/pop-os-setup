# ATOM OS Helm Chart — default values
operator:
  image: ghcr.io/atom-federation/atom-operator:7.0.0
  replicaCount: 1
  watchNamespace: default
  reconcileInterval: 5
  logLevel: INFO
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

cluster:
  enabled: true
  name: demo
  replicas: 3
  sbsThreshold: 0.01
  coherenceDriftMax: 0.05
  replayEnabled: true
  image: ghcr.io/atom-federation/atom-os:latest
  healingPolicy: conservative
  monitoringEnabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

prometheus:
  enabled: true
  operatorEnabled: true

rbac:
  operatorServiceAccount: atom-operator
  namespace: atom-system
