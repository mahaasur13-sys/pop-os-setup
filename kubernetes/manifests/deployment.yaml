apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atom-operator
  namespace: atom-system
  labels:
    app.kubernetes.io/name: atom-operator
    app.kubernetes.io/version: "7.0"
spec:
  serviceName: atom-operator
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atom-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atom-operator
        app.kubernetes.io/version: "7.0"
    spec:
      serviceAccountName: atom-operator
      terminationGracePeriodSeconds: 30
      containers:
        - name: operator
          image: ghcr.io/atom-federation/atom-operator:7.0.0
          imagePullPolicy: Always
          env:
            - name: WATCH_NAMESPACE
              value: "default"
            - name: RECONCILE_INTERVAL
              value: "5"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: atom-operator
  namespace: atom-system
  labels:
    app.kubernetes.io/name: atom-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atom-operator
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
    - name: health
      port: 8080
      targetPort: 8080
