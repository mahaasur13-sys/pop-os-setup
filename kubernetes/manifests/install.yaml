apiVersion: v1
kind: Namespace
metadata:
  name: atom-system
  labels:
    app.kubernetes.io/name: atom-os
    app.kubernetes.io/version: "7.0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atom-operator
  namespace: atom-system
  labels:
    app.kubernetes.io/name: atom-operator
    app.kubernetes.io/version: "7.0"
---
# CRD registration
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: atomclusters.atom.io
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"apiextensions.k8s.io/v1","kind":"CustomResourceDefinition","metadata":{"annotations":{},"name":"atomclusters.atom.io"}}
  labels:
    app.kubernetes.io/name: atom-os
    app.kubernetes.io/version: "7.0"
spec:
  group: atom.io
  names:
    kind: ATOMCluster
    plural: atomclusters
    singular: atomcluster
    shortNames:
      - ac
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: SBS Violation %
          type: number
          jsonPath: .status.sbsViolationRate
        - name: Drift Score
          type: number
          jsonPath: .status.coherenceDrift
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - replicas
              properties:
                replicas:
                  type: integer
                  minimum: 1
                sbsThreshold:
                  type: number
                  default: 0.01
                coherenceDriftMax:
                  type: number
                  default: 0.05
                replayEnabled:
                  type: boolean
                  default: true
                image:
                  type: string
                  default: ghcr.io/atom-federation/atom-os:latest
                resources:
                  type: object
                healingPolicy:
                  type: string
                  enum: ["aggressive", "conservative", "disabled"]
                  default: conservative
                monitoringEnabled:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
                sbsViolationRate:
                  type: number
                coherenceDrift:
                  type: number
                quorumSafe:
                  type: boolean
                currentVersion:
                  type: string
                conditions:
                  type: array
                nodeStates:
                  type: array
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atom-operator
  namespace: atom-system
rules:
  - apiGroups: ["atom.io"]
    resources: ["atomclusters", "atomclusters/status"]
    verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/status", "statefulsets/finalizers"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["services", "services/status", "pods", "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atom-operator
roleRef:
  kind: ClusterRole
  name: atom-operator
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: atom-operator
    namespace: atom-system
