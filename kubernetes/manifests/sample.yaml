apiVersion: atom.io/v1
kind: ATOMCluster
metadata:
  name: demo
  namespace: default
  labels:
    app.kubernetes.io/name: atom-cluster
spec:
  replicas: 3
  sbsThreshold: 0.01
  coherenceDriftMax: 0.05
  replayEnabled: true
  image: ghcr.io/atom-federation/atom-os:latest
  healingPolicy: conservative
  monitoringEnabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
