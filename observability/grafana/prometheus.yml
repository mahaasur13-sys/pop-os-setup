global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "atom-nodes"
    static_configs:
      - targets:
          - "atom-node-a:9464"
          - "atom-node-b:9464"
          - "atom-node-c:9464"
        labels:
          group: "atom-cluster"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]
