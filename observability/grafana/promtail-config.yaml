server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - endpoint: http://loki:3100/loki/api/v1/push
    timeout: 10s

scrape_configs:
  - job_name: atom-system
    static_configs:
      - targets:
          - localhost
        labels:
          job: atom-system
          __path__: /var/log/atom/*.log

  - job_name: atom-application
    static_configs:
      - targets:
          - localhost
        labels:
          job: atom-application
          __path__: /var/log/atom-app/*.log

  - job_name: atom-kernel
    syslog:
      listen_address: localhost:1514
      labels:
        job: atom-kernel
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'hostname'
