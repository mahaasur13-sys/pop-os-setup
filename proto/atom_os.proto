syntax = "proto3";

package atom;

// ── Node Identity ──────────────────────────────────────────────────────────
message Pong {
  string node_id = 1;
  int64 term = 2;
  bool ok = 3;
}

// ── Command Forwarding ─────────────────────────────────────────────────────
message ForwardRequest {
  string command = 1;
  string origin_node = 2;
}

message ForwardResponse {
  bool success = 1;
  string result = 2;
}

// ── Event Stream ────────────────────────────────────────────────────────────
message Event {
  string node_id = 1;
  int64 seq = 2;
  string type = 3;
}

// ── SBA Audit ───────────────────────────────────────────────────────────────
message SBARecord {
  string node_id = 1;
  string invariant = 2;
  bool held = 3;
  int64 term = 4;
  int64 timestamp_ms = 5;
}

// ── Raft Consensus ─────────────────────────────────────────────────────────
message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  repeated bytes entries = 5;
  int64 leader_commit = 6;
}

message AppendEntriesResponse {
  int64 term = 1;
  bool success = 2;
}

// ── Service Definition ────────────────────────────────────────────────────
service NodeRPC {
  rpc Ping(PingRequest) returns (Pong);
  rpc Forward(ForwardRequest) returns (ForwardResponse);
  rpc StreamEvents(EventRequest) returns (stream Event);
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message PingRequest {}
message EventRequest {}
