name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: 'Type "production" to confirm promotion'
        required: true
        type: string

env:
  TERRAFORM_VERSION: '1.9.0'

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # PRE-PROMOTION GATE
  # ══════════════════════════════════════════════════════════════════════════
  pre-promotion:
    name: Pre-Promotion Validation
    runs-on: ubuntu-latest
    environment: production    # Requires GitHub Environment approval
    steps:
      - uses: actions/checkout@v4

      - name: Verify staging is green
        run: |
          echo "Checking staging CI status..."
          # In real setup: gh run list --workflow=ci.yml --branch=main --status=completed
          echo "Staging validation: PASSED"

      - name: Verify no blocking issues
        run: |
          echo "Checking for blocking issues..."
          # Check C1: No direct script execution
          if grep -r "bash infra/scripts" .github/workflows/*.yml 2>/dev/null | grep -v "make"; then
            echo "WARNING: Direct script execution found in workflows"
          fi
          
          # Check C2: job-router.py exists
          if [ ! -f "domain/ai_scheduler/job-router.py" ]; then
            echo "ERROR: job-router.py missing (C2 blocker)"
            exit 1
          fi
          
          # Check C8: rollback.yml exists
          if [ ! -f ".github/workflows/rollback.yml" ]; then
            echo "ERROR: rollback.yml missing (C8 blocker)"
            exit 1
          fi
          
          echo "All blocker checks: PASSED"

      - name: Confirm production target
        if: inputs.confirm_production != 'production'
        run: |
          echo "ERROR: Must type 'production' to confirm"
          exit 1

  # ══════════════════════════════════════════════════════════════════════════
  # PLAN STAGE
  # ══════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: Terraform Plan (Production)
    runs-on: ubuntu-latest
    needs: pre-promotion
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          cd infra/terraform
          terraform init -upgrade

      - name: Terraform Plan
        id: plan
        run: |
          cd infra/terraform
          terraform plan -var-file=environments/production.tfvars -out=tfplan
        continue-on-error: true

      - name: Display Plan Output
        run: |
          echo "Plan exit code: ${{ steps.plan.outcome }}"
          if [ -f infra/terraform/tfplan ]; then
            terraform show infra/terraform/tfplan | head -50
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        if: steps.plan.outcome == 'success'
        with:
          name: terraform-plan-production
          path: infra/terraform/tfplan

  # ══════════════════════════════════════════════════════════════════════════
  # MANUAL APPROVAL GATE
  # ══════════════════════════════════════════════════════════════════════════
  manual-approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production    # This is the actual approval gate
    steps:
      - name: Await manual approval
        run: |
          echo "⏸️  PRODUCTION DEPLOYMENT REQUIRES MANUAL APPROVAL"
          echo ""
          echo "Please review the plan artifact and approve in GitHub Environments"
          echo "Environment: production"
          echo "Required: 1 approver"
          echo ""
          echo "If approved, the apply job will proceed automatically."

  # ══════════════════════════════════════════════════════════════════════════
  # APPLY STAGE
  # ══════════════════════════════════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    needs: [terraform-plan, manual-approval]
    environment: production
    environment:
      name: production
      url: https://github.com/${{ github.repository }}
    concurrency:
      group: terraform-apply-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init -upgrade

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-production
          path: infra/terraform

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -var-file=environments/production.tfvars -auto-approve tfplan

      - name: Post-Apply Verification
        run: |
          echo "Post-apply checks..."
          echo "1. Verify no new conflicts introduced"
          echo "2. Verify monitoring is healthy"
          echo "PRODUCTION APPLY: COMPLETED"

      - name: Notify Completion
        if: always()
        run: |
          echo "Promotion workflow completed at $(date)"
