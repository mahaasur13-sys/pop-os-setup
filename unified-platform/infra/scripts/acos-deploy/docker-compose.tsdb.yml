version: "3.8"

services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: always
    environment:
      POSTGRES_USER: cluster
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: cluster_metrics
    ports:
      - "5432:5432"
    volumes:
      - ./tsdb_data:/var/lib/postgresql/data
      - ./tsdb/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      -c shared_preload_libraries=timescaledb
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluster -d cluster_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
