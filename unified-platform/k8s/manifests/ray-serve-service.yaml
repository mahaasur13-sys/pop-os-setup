# Ray Serve inference service — Kubernetes manifest
apiVersion: v1
kind: Service
metadata:
  name: ray-serve-inference
  namespace: default
spec:
  selector:
    app: ray-serve
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-serve-inference
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ray-serve
  template:
    metadata:
      labels:
        app: ray-serve
    spec:
      containers:
        - name: inference
          image: rayproject/ray:latest
          command: ["python"]
          args: ["/opt/ray-jobs/ray_serve_inference.py"]
          ports:
            - containerPort: 8000
          resources:
            limits:
              gpu: 0.5
              memory: "4Gi"
            requests:
              memory: "2Gi"
          volumeMounts:
            - name: ray-jobs
              mountPath: /opt/ray-jobs
      volumes:
        - name: ray-jobs
          persistentVolumeClaim:
            claimName: ray-jobs-pvc
