# =============================================================================
# K8s Self-Healing RBAC
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-watchdog
  namespace: cluster-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-watchdog
  namespace: cluster-infra
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "delete", "patch"]
- apiGroups: ["apps"]
  resources: ["statefulsets", "deployments", "daemonsets"]
  verbs: ["get", "list", "patch", "restart"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-watchdog
  namespace: cluster-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-watchdog
subjects:
- kind: ServiceAccount
  name: cluster-watchdog
  namespace: cluster-infra
