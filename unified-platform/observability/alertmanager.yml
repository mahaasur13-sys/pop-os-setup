global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'acos-alert@localhost'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'acos-admins'
  routes:
    - match:
        severity: critical
      receiver: 'acos-admins'
      continue: true
    - match:
        component: 'amnezia_wg'
      receiver: 'acos-tunnel-alerts'

receivers:
  - name: 'acos-admins'
    webhook_configs:
      - url: 'http://localhost:9001/webhook'

  - name: 'acos-tunnel-alerts'
    webhook_configs:
      - url: 'http://localhost:9001/tunnel-alert'
